name: Saatlik Borsa Takip

on:
  schedule:
    # Hafta içi her saat başı çalışır (UTC+0). 
    # Türkiye saati (UTC+3) 10:00 - 18:30 arası için:
    # 10:00 TR = 07:00 UTC
    # 18:00 TR = 15:00 UTC
    - cron: '0 7-15 * * 1-5'
  workflow_dispatch: # Manuel tetikleme için

jobs:
  check-stocks:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests python-dotenv supabase

      - name: Takibi Çalıştır
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: "true"
        run: python borsa_veri_cek.py
